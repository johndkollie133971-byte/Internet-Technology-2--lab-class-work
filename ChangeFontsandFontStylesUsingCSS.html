<!DOCTYPE html>
<html>

          <head>
                    <title>Font Style Example</title>
                    <style>
                              .font1 {
                                        font-family: Arial;
                                        font-size: 20px;
                                        font-style: italic;
                              }

                              .font2 {
                                        font-family: 'Times New Roman';
                                        font-size: 24px;
                                        font-weight: bold;
                              }
                    </style>
          </head>

          <body>
                    <p class="font1">This is Arial Italic Text.</p>
                    <p class="font2">This is Times New Roman Bold Text.</p>
          </body>

</html>
