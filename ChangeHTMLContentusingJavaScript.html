<!DOCTYPE html>
<html>

          <head>
                    <title>Change Content</title>
          </head>

          <body>

                    <h2 id="demo">Original Text</h2>
                    <button onclick="changeText()">Click Me</button>

                    <script>
                              function changeText() {
                                        document.getElementById("demo").innerHTML = "Text Changed using JavaScript!";
                              }
                    </script>

          </body>

</html>
