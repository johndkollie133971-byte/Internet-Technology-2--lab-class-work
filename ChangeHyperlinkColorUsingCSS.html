<!DOCTYPE html>
<html>

          <head>
                    <title>Hyperlink Color</title>
                    <style>
                              a:link {
                                        color: blue;
                              }

                              a:visited {
                                        color: purple;
                              }

                              a:hover {
                                        color: red;
                              }

                              a:active {
                                        color: green;
                              }
                    </style>
          </head>

          <body>
                    <a href="https://www.google.com">Visit Google</a>
          </body>

</html>
