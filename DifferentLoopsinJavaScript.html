<!DOCTYPE html>
<html>

          <head>
                    <title>Loops Example</title>
          </head>

          <body>

                    <script>

                              for (var i = 1; i <= 3; i++) {
                                        document.write("For Loop: " + i + "<br>");
                              }

                              var j = 1;
                              while (j <= 3) {
                                        document.write("While Loop: " + j + "<br>");
                                        j++;
                              }


                              var k = 1;
                              do {
                                        document.write("Do-While Loop: " + k + "<br>");
                                        k++;
                              } while (k <= 3);
                    </script>

          </body>

</html>
