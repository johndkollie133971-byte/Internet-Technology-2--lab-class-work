<!DOCTYPE html>
<html>

          <head>
                    <title>Image Opacity Example</title>
                    <style>
                              img {
                                        width: 300px;
                                        opacity: 1;
                                        transition: 0.5s;
                              }

                              img:hover {
                                        opacity: 0.5;
                              }
                    </style>
          </head>

          <body>
                    <img src="image.jpg" alt="Sample Image">
          </body>

</html>
