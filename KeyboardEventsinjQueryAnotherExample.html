<!DOCTYPE html>
<html>

          <head>
                    <title>Keyboard Events 2</title>
                    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
                    <script>
                              $(document).ready(function () {
                                        $(document).keydown(function (event) {
                                                  alert("You pressed key: " + event.key);
                                        });
                              });
                    </script>
          </head>

          <body>

                    <h3>Press any key</h3>

          </body>

</html>
