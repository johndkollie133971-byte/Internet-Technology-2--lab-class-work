<!DOCTYPE html>
<html>

          <head>
                    <title>CSS Selectors Example</title>
                    <style>
                              p {
                                        color: blue;
                              }


                              #special {
                                        color: red;
                              }


                              .highlight {
                                        background-color: yellow;
                              }

                              h1,
                              h2 {
                                        color: green;
                              }


                              * {
                                        font-family: Arial;
                              }
                    </style>
          </head>

          <body>
                    <h1>Heading 1</h1>
                    <h2>Heading 2</h2>
                    <p>This is normal paragraph.</p>
                    <p id="special">This is ID selector paragraph.</p>
                    <p class="highlight">This is Class selector paragraph.</p>
          </body>

</html>
